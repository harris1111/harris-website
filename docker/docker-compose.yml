services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: harris-website
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://harris:${POSTGRES_PASSWORD}@db:5432/harris_cv
      - NODE_ENV=production
    depends_on:
      db:
        condition: service_healthy
    networks:
      - harris-net

  db:
    image: postgres:16-alpine
    container_name: harris-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=harris
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=harris_cv
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U harris -d harris_cv"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - harris-net

  nginx:
    image: nginx:alpine
    container_name: harris-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Uncomment when SSL is configured:
      # - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app
    networks:
      - harris-net

volumes:
  postgres_data:

networks:
  harris-net:
    driver: bridge
